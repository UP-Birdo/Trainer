name: Fehler melden
description: Etwas funktioniert nicht wie erwartet
title: "[Fehler] "
labels: ["bug"]
body:
    - type: textarea
      id: beschreibung
      attributes:
          label: Was ist passiert?
          description: Was hast du getan, was hast du erwartet, was kam stattdessen?
          placeholder: z. B. Nach dem letzten Satz bleibt der Timer stehen …
      validations:
          required: true
    - type: input
      id: version
      attributes:
          label: App-Version
          description: Steht in der App unter Mehr → „Was ist neu" (z. B. 0.082)
    - type: dropdown
      id: geraet
      attributes:
          label: Gerät
          options:
              - iPhone
              - iPad
              - Android
              - Computer
